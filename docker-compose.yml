# ══════════════════════════════════════════════════════════════════════
# SOC SENTINEL — Docker Compose (Produção)
# ══════════════════════════════════════════════════════════════════════
services:
  soc-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-sentinel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${COMMAND_PORT:-8765}:${COMMAND_PORT:-8765}"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${COMMAND_PORT:-8765}/health')\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
